<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Pink Ribbon Camera – Prototype</title>
<style>
  :root{
    --champagne:#FBF3EF;
    --pale-pink:#F6D9DD;
    --rose:#E8A0AE;
    --rose-deep:#C97186;
    --rose-text:#7A3B49;
    --glass:rgba(255,255,255,0.28);
    --glass-border:rgba(255,255,255,0.55);
    --glass-strong:rgba(255,255,255,0.5);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    background:#000;
    font-family:-apple-system,"Hiragino Sans","Helvetica Neue",sans-serif;
    overscroll-behavior:none;
  }
  #app{
    position:fixed;inset:0;
    overflow:hidden;
    background:linear-gradient(160deg,#2a1418,#000);
  }
  #camera{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    background:#111;
  }
  #camera.mirrored{transform:scaleX(-1);}
  #ribbonCanvas{
    position:absolute;inset:0;
    width:100%;height:100%;
    pointer-events:none;
    mix-blend-mode:normal;
  }
  /* ===== 上部バー ===== */
  .top-bar{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;
    z-index:20;
  }
  .glass-pill,.glass-icon{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    color:#fff;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
  }
  .glass-icon{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;
    transition:transform .15s ease;
  }
  .glass-icon:active{transform:scale(0.88);}
  .ratio-pill{
    padding:6px 16px;border-radius:20px;
    font-size:12px;letter-spacing:.05em;font-weight:600;
  }
  /* ===== フォーカス枠（装飾） ===== */
  .focus-frame{
    position:absolute;
    top:32%;left:14%;right:14%;bottom:30%;
    pointer-events:none;z-index:5;
    opacity:.55;
  }
  .focus-frame span{
    position:absolute;width:20px;height:20px;
    border-color:rgba(255,255,255,.85);
    border-style:solid;border-width:0;
  }
  .focus-frame .tl{top:0;left:0;border-top-width:1.5px;border-left-width:1.5px;border-top-left-radius:6px;}
  .focus-frame .tr{top:0;right:0;border-top-width:1.5px;border-right-width:1.5px;border-top-right-radius:6px;}
  .focus-frame .bl{bottom:0;left:0;border-bottom-width:1.5px;border-left-width:1.5px;border-bottom-left-radius:6px;}
  .focus-frame .br{bottom:0;right:0;border-bottom-width:1.5px;border-right-width:1.5px;border-bottom-right-radius:6px;}
  /* ===== 下部UI ===== */
  .bottom-area{
    position:absolute;left:0;right:0;bottom:0;
    padding-bottom:calc(env(safe-area-inset-bottom) + 14px);
    z-index:20;
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  .mode-row{
    display:flex;gap:22px;
    padding:8px 20px;border-radius:22px;
  }
  .mode-btn{
    background:none;border:none;color:rgba(255,255,255,.65);
    font-size:11px;letter-spacing:.08em;font-weight:600;
    padding:4px 2px;position:relative;
  }
  .mode-btn.active{color:#fff;}
  .mode-btn.active::after{
    content:"";position:absolute;left:50%;bottom:-6px;
    transform:translateX(-50%);
    width:5px;height:5px;border-radius:50%;
    background:var(--pale-pink);
  }
  .controls-row{
    width:100%;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 34px;
  }
  .side-btn{
    width:52px;height:52px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }
  .thumb-btn{
    background-size:cover;background-position:center;
    border:2px solid rgba(255,255,255,.7);
  }
  .shutter{
    width:76px;height:76px;border-radius:50%;
    background:rgba(255,255,255,.18);
    border:3.5px solid rgba(255,255,255,.9);
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(6px);
  }
  .shutter-inner{
    width:60px;height:60px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--pale-pink) 70%, var(--rose) 100%);
    transition:transform .12s ease;
  }
  .shutter:active .shutter-inner{transform:scale(.85);}
  /* ===== トースト ===== */
  #toast{
    position:absolute;left:50%;bottom:190px;
    transform:translateX(-50%) translateY(10px);
    background:rgba(30,15,18,.75);color:#fff;
    padding:9px 18px;border-radius:20px;font-size:12.5px;
    opacity:0;transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;z-index:40;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  /* ===== 撮影フラッシュ演出 ===== */
  #flash{
    position:absolute;inset:0;background:#fff;opacity:0;
    pointer-events:none;z-index:50;
  }
  /* ===== 起動オーバーレイ ===== */
  #startOverlay{
    position:absolute;inset:0;z-index:60;
    background:linear-gradient(160deg,var(--champagne),var(--pale-pink));
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;text-align:center;padding:30px;
  }
  #startOverlay h1{
    color:var(--rose-text);font-size:22px;margin:0;font-weight:700;letter-spacing:.03em;
  }
  #startOverlay p{color:var(--rose-deep);font-size:13px;line-height:1.7;margin:0;max-width:280px;}
  #startBtn{
    padding:13px 34px;border-radius:30px;border:none;
    background:var(--rose-deep);color:#fff;font-size:14px;font-weight:600;
    letter-spacing:.04em;
  }
  #startOverlay.hidden{display:none;}
</style>
</head>
<body>
<div id="app">
  <video id="camera" autoplay playsinline muted></video>
  <canvas id="ribbonCanvas"></canvas>

  <div class="focus-frame">
    <span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span>
  </div>

  <div class="top-bar">
    <div class="glass-icon" id="menuBtn">⋯</div>
    <div class="glass-pill ratio-pill" id="ratioBtn">3:4</div>
    <div class="glass-icon" id="flipBtn">⟲</div>
  </div>

  <div class="bottom-area">
    <div class="glass-pill mode-row">
      <button class="mode-btn active" data-mode="photo">PHOTO</button>
      <button class="mode-btn" data-mode="portrait">PORTRAIT</button>
      <button class="mode-btn" data-mode="video">VIDEO</button>
    </div>
    <div class="controls-row">
      <div class="glass-icon side-btn thumb-btn" id="thumbBtn"></div>
      <div class="shutter" id="shutterBtn"><div class="shutter-inner"></div></div>
      <div class="glass-icon side-btn" id="effectBtn">✦</div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="flash"></div>

  <div id="startOverlay">
    <h1>Pink Ribbon Camera</h1>
    <p>カメラへのアクセスを許可すると、淡いピンクリボンが漂う特別な撮影体験が始まります。</p>
    <button id="startBtn">カメラを起動する</button>
  </div>
</div>

<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
(() => {
  const video = document.getElementById('camera');
  const ribbonCanvas = document.getElementById('ribbonCanvas');
  const rctx = ribbonCanvas.getContext('2d');
  const captureCanvas = document.getElementById('captureCanvas');
  const cctx = captureCanvas.getContext('2d');
  const toastEl = document.getElementById('toast');
  const flashEl = document.getElementById('flash');
  const thumbBtn = document.getElementById('thumbBtn');
  const startOverlay = document.getElementById('startOverlay');

  let facingMode = 'environment';
  let currentStream = null;
  let effectLevel = 2; // 0=off, 1=soft, 2=normal
  const effectLabels = ['✦off', '✦soft', '✦'];

  // ---------- Toast ----------
  let toastTimer;
  function toast(msg){
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1600);
  }

  // ---------- Camera ----------
  async function startCamera(){
    try{
      if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); }
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode, width:{ideal:1080}, height:{ideal:1440} },
        audio:false
      });
      currentStream = stream;
      video.srcObject = stream;
      video.classList.toggle('mirrored', facingMode === 'user');
      startOverlay.classList.add('hidden');
    }catch(err){
      toast('カメラを起動できませんでした');
      console.error(err);
    }
  }

  document.getElementById('startBtn').addEventListener('click', startCamera);
  document.getElementById('flipBtn').addEventListener('click', ()=>{
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });
  document.getElementById('menuBtn').addEventListener('click', ()=>toast('メニュー（MVP未実装）'));
  document.getElementById('ratioBtn').addEventListener('click', ()=>toast('比率切替（MVP未実装）'));

  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.dataset.mode !== 'photo'){
        toast(btn.dataset.mode.toUpperCase() + ' は今回のプロトタイプ未実装です');
        return;
      }
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('effectBtn').addEventListener('click', ()=>{
    effectLevel = (effectLevel + 1) % 3;
    toast('リボン演出: ' + ['オフ','控えめ','標準'][effectLevel]);
  });

  // ---------- Canvas sizing ----------
  function resizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    ribbonCanvas.width = innerWidth * dpr;
    ribbonCanvas.height = innerHeight * dpr;
    rctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ---------- Ribbon shape (抽象化された一般的なリボンモチーフ) ----------
  function pathRibbon(ctx){
    ctx.beginPath();
    // 上部の結び目（左右の輪）
    ctx.moveTo(0,-10);
    ctx.bezierCurveTo(-24,-46,-56,-26,-30,-1);
    ctx.bezierCurveTo(-16,13,-2,4,0,-10);
    ctx.closePath();
    ctx.moveTo(0,-10);
    ctx.bezierCurveTo(24,-46,56,-26,30,-1);
    ctx.bezierCurveTo(16,13,2,4,0,-10);
    ctx.closePath();
    // 左テール
    ctx.moveTo(-6,-3);
    ctx.bezierCurveTo(-22,20,-36,46,-21,76);
    ctx.bezierCurveTo(-15,58,-9,38,-2,14);
    ctx.closePath();
    // 右テール
    ctx.moveTo(6,-3);
    ctx.bezierCurveTo(22,20,36,46,21,76);
    ctx.bezierCurveTo(15,58,9,38,2,14);
    ctx.closePath();
  }

  function drawRibbon(ctx, r){
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(r.rotation);
    ctx.scale(r.scale, r.scale);
    ctx.globalAlpha = Math.max(0, r.opacity);

    const grad = ctx.createLinearGradient(-40,-40,30,80);
    grad.addColorStop(0, 'rgba(255,244,240,0.95)');
    grad.addColorStop(0.45, 'rgba(232,160,174,0.9)');
    grad.addColorStop(1, 'rgba(201,113,134,0.85)');

    ctx.shadowColor = 'rgba(232,160,174,0.55)';
    ctx.shadowBlur = 22;
    ctx.fillStyle = grad;
    pathRibbon(ctx);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha *= 0.35;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 1.4;
    pathRibbon(ctx);
    ctx.stroke();
    ctx.restore();
  }

  // ---------- Particle (disperse phase) ----------
  function makeParticle(x,y){
    return {
      x, y,
      vx:(Math.random()-0.5)*8,
      vy:-(20 + Math.random()*25),
      life:0, maxLife: 1.4 + Math.random()*1.2,
      size: 1.5 + Math.random()*2.5
    };
  }
  const particles = [];

  function drawParticle(ctx,p){
    const t = p.life / p.maxLife;
    const alpha = (1-t) * 0.8;
    if(alpha<=0) return;
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
    g.addColorStop(0, `rgba(255,246,242,${alpha})`);
    g.addColorStop(1, `rgba(255,246,242,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);
    ctx.fill();
  }

  // ---------- Ribbon lifecycle ----------
  // layer: 0=背景(遅い/小さい/薄い) 1=中景 2=前景(速い/大きい/濃い)
  function spawnRibbon(){
    const w = innerWidth, h = innerHeight;
    const layer = Math.random() < 0.4 ? 0 : (Math.random() < 0.7 ? 1 : 2);
    const edge = Math.floor(Math.random()*4); // 0上 1右 2下 3左
    let x,y;
    if(edge===0){ x = Math.random()*w; y = -60; }
    else if(edge===1){ x = w+60; y = Math.random()*h; }
    else if(edge===2){ x = Math.random()*w; y = h+60; }
    else { x = -60; y = Math.random()*h; }

    const speedBase = [10,18,28][layer];
    const targetX = w*0.2 + Math.random()*w*0.6;
    const targetY = h*0.2 + Math.random()*h*0.6;
    const ang = Math.atan2(targetY-y, targetX-x);

    return {
      x, y, layer,
      vx: Math.cos(ang)*speedBase,
      vy: Math.sin(ang)*speedBase,
      scale: [0.55,0.8,1.05][layer] * (0.85 + Math.random()*0.3),
      rotation: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5) * 0.25,
      opacity: 0,
      targetOpacity: [0.35,0.55,0.75][layer],
      phase: 'enter',
      age: 0,
      driftDuration: 6 + Math.random()*5,
      lastParticle: 0
    };
  }

  const SAFE_ZONE = () => ({
    cx: innerWidth/2, cy: innerHeight*0.5,
    rx: innerWidth*0.32, ry: innerHeight*0.28
  });

  function inSafeZone(x,y){
    const z = SAFE_ZONE();
    const dx=(x-z.cx)/z.rx, dy=(y-z.cy)/z.ry;
    return dx*dx+dy*dy < 1;
  }

  let ribbons = [];
  for(let i=0;i<7;i++) ribbons.push(spawnRibbon());

  let lastT = performance.now();
  function step(now){
    const dt = Math.min((now-lastT)/1000, 0.05); // 実時間ベース（デバイス差を吸収）
    lastT = now;

    const w = innerWidth, h = innerHeight;
    rctx.clearRect(0,0,w,h);

    if(effectLevel > 0){
      const globalAlpha = effectLevel === 1 ? 0.55 : 1;

      // レイヤー順（背景→前景）に描画してパララックス感を出す
      for(let layer=0; layer<3; layer++){
        for(const r of ribbons){
          if(r.layer !== layer) continue;
          updateRibbon(r, dt, w, h);
          if(r.opacity > 0.01){
            const before = r.opacity;
            r.opacity *= globalAlpha;
            drawRibbon(rctx, r);
            r.opacity = before;
          }
        }
      }

      // パーティクル
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.life += dt;
        p.x += p.vx*dt; p.y += p.vy*dt;
        if(p.life >= p.maxLife){ particles.splice(i,1); continue; }
        drawParticle(rctx,p);
      }
    }

    ribbons = ribbons.filter(r => !(r.phase==='disperse' && r.opacity<=0.01));
    while(ribbons.length < 7) ribbons.push(spawnRibbon());

    requestAnimationFrame(step);
  }

  function updateRibbon(r, dt, w, h){
    r.age += dt;
    r.rotation += r.rotSpeed*dt;

    if(r.phase === 'enter'){
      r.opacity += (r.targetOpacity - r.opacity) * Math.min(1, dt*1.5);
      r.x += r.vx*dt; r.y += r.vy*dt;
      if(r.age > 1.8){ r.phase='drift'; r.age=0; }
    }
    else if(r.phase === 'drift'){
      // 中心の被写体エリアをやんわり避ける
      if(inSafeZone(r.x,r.y)){
        const z = SAFE_ZONE();
        const dx = r.x - z.cx, dy = r.y - z.cy;
        const len = Math.hypot(dx,dy) || 1;
        r.vx += (dx/len) * 14 * dt;
        r.vy += (dy/len) * 14 * dt;
      }
      // ゆるやかな漂い（ノイズ的揺らぎ）
      r.vx += (Math.random()-0.5) * 6 * dt;
      r.vy += (Math.random()-0.5) * 6 * dt - 2*dt; // ほんの少し上昇傾向
      const speedCap = [14,20,30][r.layer];
      const sp = Math.hypot(r.vx,r.vy) || 1;
      if(sp > speedCap){ r.vx = r.vx/sp*speedCap; r.vy = r.vy/sp*speedCap; }
      r.x += r.vx*dt; r.y += r.vy*dt;

      // 画面外に出過ぎたら中心方向へ軽く戻す
      const margin = 80;
      if(r.x<-margin||r.x>w+margin||r.y<-margin||r.y>h+margin){
        r.vx += (w/2-r.x)*0.05*dt;
        r.vy += (h/2-r.y)*0.05*dt;
      }

      if(r.age > r.driftDuration){ r.phase='disperse'; r.age=0; }
    }
    else if(r.phase === 'disperse'){
      r.vy -= 18*dt; // 上昇加速
      r.vx *= (1 - 0.3*dt);
      r.x += r.vx*dt; r.y += r.vy*dt;
      r.opacity -= dt * 0.45;
      r.scale += dt*0.06;

      r.lastParticle += dt;
      if(r.lastParticle > 0.09){
        r.lastParticle = 0;
        particles.push(makeParticle(r.x + (Math.random()-0.5)*20, r.y + (Math.random()-0.5)*30));
      }
    }
  }
  requestAnimationFrame(step);

  // ---------- Capture (video + ribbon overlay を合成) ----------
  function drawVideoCover(ctx, video, cw, ch){
    const vw = video.videoWidth, vh = video.videoHeight;
    if(!vw || !vh) return;
    const vRatio = vw/vh, cRatio = cw/ch;
    let sx,sy,sw,sh;
    if(vRatio > cRatio){
      sh = vh; sw = vh*cRatio; sy = 0; sx = (vw-sw)/2;
    } else {
      sw = vw; sh = vw/cRatio; sx = 0; sy = (vh-sh)/2;
    }
    ctx.save();
    if(facingMode === 'user'){
      ctx.translate(cw,0); ctx.scale(-1,1);
    }
    ctx.drawImage(video, sx,sy,sw,sh, 0,0,cw,ch);
    ctx.restore();
  }

  async function capturePhoto(){
    const cw = innerWidth, ch = innerHeight;
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    captureCanvas.width = cw*dpr;
    captureCanvas.height = ch*dpr;
    cctx.setTransform(dpr,0,0,dpr,0,0);

    drawVideoCover(cctx, video, cw, ch);
    cctx.drawImage(ribbonCanvas, 0,0,cw,ch);

    flashEl.style.transition = 'none';
    flashEl.style.opacity = '0.85';
    requestAnimationFrame(()=>{
      flashEl.style.transition = 'opacity .35s ease';
      flashEl.style.opacity = '0';
    });

    captureCanvas.toBlob(async (blob)=>{
      if(!blob) return;
      const url = URL.createObjectURL(blob);
      thumbBtn.style.backgroundImage = `url(${url})`;

      const file = new File([blob], `pink-ribbon-${Date.now()}.png`, {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({ files:[file], title:'Pink Ribbon Camera' });
          toast('保存・共有しました');
          return;
        }catch(e){ /* ユーザーがキャンセルした場合など */ }
      }
      // フォールバック（PC等 Web Share 非対応環境）
      const a = document.createElement('a');
      a.href = url; a.download = file.name;
      document.body.appendChild(a); a.click(); a.remove();
      toast('画像を保存しました');
    }, 'image/png', 0.95);
  }

  document.getElementById('shutterBtn').addEventListener('click', capturePhoto);
  document.getElementById('thumbBtn').addEventListener('click', ()=>toast('サムネイル（プレビュー画面はMVP未実装）'));

})();
</script>
</body>
</html>
